<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="/Job Application Form/CSS/Job.css" />
  </head>
  <body>
    <div class="container">
      <div class="apply_box">
        <h1>Job Application <span class="title_small">(Web)</span></h1>

        <form action="#" method="post">
          <div class="form_container">
            <div class="form_control">
              <label for="first_name">First Name :</label>
              <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="Enter First Name"
                required
              />
            </div>

            <div class="form_control">
              <label for="last_name">Last Name :</label>
              <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="Enter Last Name "
                required
              />
            </div>

            <div class="form_control">
              <label for="email">Email Id :</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email "
                required
              />
            </div>

            <div class="form_control">
              <label for="mobileNumber">Mobile Number :</label>
              <input
                type="number"
                id="mobileNumber"
                name="mobileNumber"
                placeholder="Enter Mobile Number"
                required
              />
            </div>

            <div class="form_control">
              <label for="jobRole">Job Role</label>
              <select id="jobRole" name="jobRole">
                <option value="">Select Job Role</option>
                <option value="Frontend">Frontend Developer</option>
                <option value="Backend">Backend Developer</option>
                <option value="full_stack">Full Stack Developer</option>
                <option value="ui_ux">UI UX Designer</option>
                <option value="Py">Python Developer</option>
              </select>
            </div>

            <div class="form_control">
              <label for="date">Date</label>
              <input
                type="date"
                id="date"
                name="date"
                value="2026-04-17"
                required
              />
            </div>

            <div class="form_control">
              <label for="city">City</label>
              <input
                type="text"
                id="city"
                name="city"
                placeholder="Enter city "
                required
              />
            </div>

            <div class="form_control">
              <label for="pinecode">PineCode :</label>
              <input
                type="number"
                id="pinecode"
                name="pinecode"
                placeholder="Enter Pine Code No"
                required
              />
            </div>

            <div class="textarea_control">
              <label for="Address">Address :</label>
              <textarea
                name="Address"
                id="Address"
                rows="4"
                cols="50"
                placeholder="Enter Address"
                required
              ></textarea>
            </div>

            <div class="form_control">
              <label for="upload">Upload Your CV</label>
              <input type="file" id="upload" name="upload" required />
            </div>
          </div>
          <div class="button_container">
            <button type="submit">Apply Now</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
